<script type="text/javascript">
(function() {
    function valueOrEmpty(value) {
        return value === undefined || value === null ? "" : value;
    }

    function appendOption(select, value, label) {
        select.append($("<option></option>").val(value).text(label));
    }

    function buildStateOptions(serviceId, stateSelect) {
        stateSelect.empty();
        appendOption(stateSelect, "", "complete payload");

        switch (serviceId) {
            case "BinarySwitch":
                appendOption(stateSelect, "on", "on");
                break;

            case "ShutterControl":
                appendOption(stateSelect, "level", "level");
                appendOption(stateSelect, "operationState", "operationState");
                break;

            case "RoomClimateControl":
                appendOption(stateSelect, "currentTemperature", "currentTemperature");
                appendOption(stateSelect, "targetTemperature", "targetTemperature");
                appendOption(stateSelect, "hvacMode", "hvacMode");
                appendOption(stateSelect, "hvacModes", "hvacModes");
                appendOption(stateSelect, "setpointTemperature", "setpointTemperature (raw)");
                appendOption(stateSelect, "operationMode", "operationMode (raw)");
                appendOption(stateSelect, "summerMode", "summerMode (raw)");
                appendOption(stateSelect, "temperature", "temperature (raw)");
                appendOption(stateSelect, "roomTemperature", "roomTemperature (raw)");
                break;

            case "MultiLevelSwitch":
                appendOption(stateSelect, "level", "level");
                break;

            case "HueColorTemperature":
                appendOption(stateSelect, "colorTemperature", "colorTemperature");
                break;

            case "HSBColorActuator":
                appendOption(stateSelect, "rgb", "rgb");
                break;

            case "HueBlinkingActuator":
                appendOption(stateSelect, "blinkingState", "blinkingState");
                break;

            case "SmokeDetectorCheck":
                appendOption(stateSelect, "value", "value");
                break;

            case "PowerSwitch":
                appendOption(stateSelect, "switchState", "switchState");
                break;

            case "PowerMeter":
                appendOption(stateSelect, "energyConsumption", "energyConsumption");
                appendOption(stateSelect, "powerConsumption", "powerConsumption");
                break;

            case "HeatingCircuit":
                appendOption(stateSelect, "setpointTemperature", "setpointTemperature");
                appendOption(stateSelect, "roomTemperature", "roomTemperature");
                appendOption(stateSelect, "operationMode", "operationMode");
                appendOption(stateSelect, "summerMode", "summerMode");
                break;

            case "PrivacyMode":
            case "CameraNotification":
            case "CameraLight":
            case "IntrusionDetectionControl":
                appendOption(stateSelect, "value", "value");
                break;

            case "PresenceSimulationConfiguration":
                appendOption(stateSelect, "enabled", "enabled");
                break;

            default:
                appendOption(stateSelect, "value", "value");
                break;
        }
    }

    function buildServiceOptions(serviceSelect) {
        serviceSelect.empty();

        appendOption(serviceSelect, "", "device metadata");
        appendOption(serviceSelect, "all", "all");
        appendOption(serviceSelect, "BinarySwitch", "BinarySwitch");
        appendOption(serviceSelect, "ShutterControl", "ShutterControl");
        appendOption(serviceSelect, "RoomClimateControl", "RoomClimateControl");
        appendOption(serviceSelect, "HeatingCircuit", "HeatingCircuit");
        appendOption(serviceSelect, "MultiLevelSwitch", "MultiLevelSwitch");
        appendOption(serviceSelect, "HSBColorActuator", "HSBColorActuator");
        appendOption(serviceSelect, "HueColorTemperature", "HueColorTemperature");
        appendOption(serviceSelect, "HueBlinkingActuator", "HueBlinkingActuator");
        appendOption(serviceSelect, "SmokeDetectorCheck", "SmokeDetectorCheck");
        appendOption(serviceSelect, "PowerSwitch", "PowerSwitch");
        appendOption(serviceSelect, "PowerMeter", "PowerMeter");
        appendOption(serviceSelect, "PrivacyMode", "PrivacyMode");
        appendOption(serviceSelect, "CameraNotification", "CameraNotification");
        appendOption(serviceSelect, "CameraLight", "CameraLight");
        appendOption(serviceSelect, "IntrusionDetectionControl", "IntrusionDetectionControl");
        appendOption(serviceSelect, "PresenceSimulationConfiguration", "PresenceSimulationConfiguration");
    }

    RED.nodes.registerType("shc-device", {
        category: "Bosch Smart Home",
        color: "#00A1DE",
        defaults: {
            name: { value: "" },
            shc: { value: "", type: "shc-config", required: true },
            device: { value: "", required: true },
            service: { value: "" },
            state: { value: "" },
            poll: { value: true }
        },
        inputs: 1,
        outputs: 1,
        icon: "font-awesome/fa-home",
        label: function() {
            return this.name || "shc device";
        },
        oneditprepare: function() {
            var node = this;
            var deviceSelect = $("#node-input-device");
            var serviceSelect = $("#node-input-service");
            var stateSelect = $("#node-input-state");

            function restoreSelection(select, value) {
                select.val(valueOrEmpty(value));
            }

            function refreshStates() {
                var selectedState = stateSelect.val();
                buildStateOptions(serviceSelect.val(), stateSelect);
                restoreSelection(stateSelect, node.state || selectedState);
            }

            function refreshServices() {
                var selectedService = serviceSelect.val();
                buildServiceOptions(serviceSelect);
                restoreSelection(serviceSelect, node.service || selectedService);
                refreshStates();
            }

            function loadDevices() {
                deviceSelect.empty();
                appendOption(deviceSelect, "", "select device");
                appendOption(deviceSelect, "all|all|||", "all devices");

                var configNode = RED.nodes.node($("#node-input-shc").val());
                if (!configNode) {
                    restoreSelection(deviceSelect, node.device);
                    refreshServices();
                    return;
                }

                if (Array.isArray(configNode.devices)) {
                    configNode.devices.forEach(function(device) {
                        var roomName = device.roomName || "";
                        var optionValue = [
                            valueOrEmpty(device.name),
                            valueOrEmpty(device.id),
                            valueOrEmpty(device.deviceModel),
                            valueOrEmpty(device.manufacturer),
                            valueOrEmpty(roomName)
                        ].join("|");

                        var label = device.name || device.id;
                        if (roomName) {
                            label += " (" + roomName + ")";
                        }

                        appendOption(deviceSelect, optionValue, label);
                    });
                }

                restoreSelection(deviceSelect, node.device);
                refreshServices();
            }

            $("#node-input-shc").on("change", function() {
                loadDevices();
            });

            serviceSelect.on("change", function() {
                node.service = serviceSelect.val();
                buildStateOptions(serviceSelect.val(), stateSelect);
                stateSelect.val("");
            });

            loadDevices();
            restoreSelection(serviceSelect, node.service);
            buildStateOptions(serviceSelect.val(), stateSelect);
            restoreSelection(stateSelect, node.state);
        },
        oneditsave: function() {
            this.device = $("#node-input-device").val();
            this.service = $("#node-input-service").val();
            this.state = $("#node-input-state").val();
            this.poll = $("#node-input-poll").is(":checked");
        }
    });
})();
</script>

<script type="text/x-red" data-template-name="shc-device">
    <div class="form-row">
        <label for="node-input-name"><i class="icon-tag"></i> Name</label>
        <input type="text" id="node-input-name" placeholder="Name">
    </div>

    <div class="form-row">
        <label for="node-input-shc"><i class="fa fa-cog"></i> SHC</label>
        <input type="text" id="node-input-shc">
    </div>

    <div class="form-row">
        <label for="node-input-device"><i class="fa fa-plug"></i> Device</label>
        <select id="node-input-device"></select>
    </div>

    <div class="form-row">
        <label for="node-input-service"><i class="fa fa-exchange"></i> Service</label>
        <select id="node-input-service"></select>
    </div>

    <div class="form-row">
        <label for="node-input-state"><i class="fa fa-info-circle"></i> State</label>
        <select id="node-input-state"></select>
    </div>

    <div class="form-row">
        <label for="node-input-poll"><i class="fa fa-refresh"></i> Poll events</label>
        <input type="checkbox" id="node-input-poll" style="display:inline-block; width:auto; vertical-align:middle;">
    </div>
</script>

<script type="text/x-red" data-help-name="shc-device">
    <p>Bosch Smart Home device node.</p>

    <p>
        Select a device, then optionally a service and a specific state field.
        If no state is selected, the node outputs the complete payload.
    </p>

    <p>
        For <b>RoomClimateControl</b>, the node supports normalized climate fields:
        <code>currentTemperature</code>,
        <code>targetTemperature</code>,
        <code>hvacMode</code> and
        <code>hvacModes</code>.
    </p>

    <p>
        Input payload examples for <b>RoomClimateControl</b>:
    </p>

    <pre>{
  "temperature": 21.5,
  "hvacMode": "heat"
}</pre>

    <pre>"auto"</pre>

    <pre>21.5</pre>
</script>
